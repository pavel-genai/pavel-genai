---
services:
  search-engine:
    build: ../prospector
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  block-indexer:
    build: ../periscope
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  rate-limiter-service:
    build: ../pacer
    ports:
      - "50051:50051"
      - "8082:8080"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  job-scheduler:
    build: ../planner
    ports:
      - "4000:4000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/4000 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  distributed-kvstore:
    build: ../partition
    ports:
      - "4001:4000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/4000 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  tx-mempool-simulator:
    build: ../purgatory
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8545/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  markdown-cms:
    build: ../papyrus
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/3000 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  pdf-generator:
    build: ../press
    ports:
      - "8084:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  sql-parser:
    build: ../parseql
    ports:
      - "8085:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  stream-processor:
    build: ../pipeline
    ports:
      - "8086:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf "GET /health HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && grep -q "200" <&3'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  # Health dashboard: http://localhost:8090
  dashboard:
    image: twinproduction/gatus:latest
    ports:
      - "8090:8080"
    volumes:
      - ./gatus.yaml:/config/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-shot CLI, not a daemon: run on demand with
  #   docker compose run --rm dns-resolver <domain>
  dns-resolver:
    build: ../phonebook
    profiles: ["tools"]

  p2p-gossip-protocol:
    build: ../prattle
    command: ["--port", "7946"]
    ports:
      - "7946:7946/udp"
      - "8083:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Interactive REPL, not a daemon: run on demand with
  #   docker compose run --rm raft-consensus
  raft-consensus:
    build: ../parliament
    profiles: ["tools"]
    stdin_open: true
    tty: true
