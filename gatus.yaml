---
ui:
  title: ai-pavel services
  header: ai-pavel services

endpoints:
  - name: prospector
    group: services
    url: "http://prospector:8080/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: periscope
    group: services
    url: "http://periscope:8080/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: pacer
    group: services
    url: "http://pacer:8080/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: planner
    group: services
    url: "http://planner:4000/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: partition
    group: services
    url: "http://partition:4000/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: prattle
    group: services
    url: "http://prattle:8080/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: purgatory
    group: services
    url: "http://purgatory:8545/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: papyrus
    group: services
    url: "http://papyrus:3000/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: press
    group: services
    url: "http://press:8080/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: parseql
    group: services
    url: "http://parseql:8080/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: pipeline
    group: services
    url: "http://pipeline:8080/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: redis
    group: infrastructure
    url: "tcp://redis:6379"
    interval: 30s
    conditions:
      - "[CONNECTED] == true"
